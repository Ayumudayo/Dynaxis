syntax = "proto3";
package server.auth.v1;

option csharp_namespace = "Server.Auth.V1";

message LoginRequest {
  string username = 1;
  string token = 2; // opaque or JWT
  string trace_id = 3;
}

message LoginResponse {
  bool success = 1;
  string user_id = 2;
  string message = 3;
  string jwt = 4; // optional new token
}

message ValidateTokenRequest {
  string jwt = 1;
  string trace_id = 2;
}

message ValidateTokenResponse {
  bool valid = 1;
  string user_id = 2;
  repeated string scopes = 3;
}

service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
}

