name: Core API Checks

on:
  push:
    branches:
      - main
    paths:
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "core/**"
      - "tests/**"
      - ".github/workflows/**"
      - "scripts/build.ps1"
      - "scripts/setup_conan.ps1"
      - "tools/check_core_api_contracts.py"
      - "docs/core-api/**"
  pull_request:
    paths:
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "core/**"
      - "tests/**"
      - ".github/workflows/**"
      - "scripts/build.ps1"
      - "scripts/setup_conan.ps1"
      - "tools/check_core_api_contracts.py"
      - "docs/core-api/**"

env:
  PYTHONIOENCODING: utf-8

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-api-consumer-windows:
    name: Core API Governance and Consumer Tests (Windows)
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      CONAN_HOME: ${{ github.workspace }}-conan2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Mark Conan cache restore start (Windows)
        shell: pwsh
        run: |
          "CONAN_CACHE_RESTORE_START=$(Get-Date -AsUTC -Format o)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Restore Conan cache (Windows)
        id: conan_cache_restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CONAN_HOME }}
          key: ${{ runner.os }}-conan2-${{ hashFiles('conan.lock', 'conanfile.py', 'conan/profiles/**', 'scripts/setup_conan.ps1', 'scripts/build.ps1') }}
          restore-keys: |
            ${{ runner.os }}-conan2-

      - name: Summarize Conan cache restore (Windows)
        shell: pwsh
        run: |
          $start = [DateTime]::Parse($env:CONAN_CACHE_RESTORE_START)
          $elapsed = [Math]::Round(((Get-Date).ToUniversalTime() - $start).TotalSeconds, 2)
          $hit = '${{ steps.conan_cache_restore.outputs.cache-hit }}'
          if ([string]::IsNullOrWhiteSpace($hit)) { $hit = 'false' }
          $matchedKey = '${{ steps.conan_cache_restore.outputs.cache-matched-key }}'
          if ([string]::IsNullOrWhiteSpace($matchedKey)) { $matchedKey = 'N/A' }
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '### conan cache telemetry (Windows API governance)'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- restore_hit: {0}" -f $hit)
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- restore_elapsed_sec: {0}" -f $elapsed)
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- restore_key: {0}" -f $matchedKey)

      - name: Ensure Conan cache directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${{ env.CONAN_HOME }}" | Out-Null

      - name: Ensure lockfile exists
        shell: pwsh
        run: |
          if (-not (Test-Path "conan.lock")) {
            throw "conan.lock is required for reproducible Conan CI runs"
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan2
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install "conan>=2.0,<3"
          conan --version

      - name: Enable MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Check Core API Boundary Contract
        shell: pwsh
        run: |
          python tools/check_core_api_contracts.py --check-boundary

      - name: Check Core API Boundary Fixtures
        shell: pwsh
        run: |
          python tools/check_core_api_contracts.py --check-boundary-fixtures

      - name: Check Core Stable Governance Fixtures
        shell: pwsh
        run: |
          python tools/check_core_api_contracts.py --check-stable-governance-fixtures

      - name: Check Core API Docs Freshness (PR)
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: |
          python tools/check_core_api_contracts.py --check-doc-freshness --base-sha "${{ github.event.pull_request.base.sha }}" --head-sha "${{ github.sha }}"

      - name: Check Core API PR Governance (PR)
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: |
          python tools/check_core_api_contracts.py --check-pr-governance --base-sha "${{ github.event.pull_request.base.sha }}" --head-sha "${{ github.sha }}" --event-path "${{ github.event_path }}"

      - name: Check Core Stable Header Governance (PR)
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: |
          python tools/check_core_api_contracts.py --check-stable-change-governance --base-sha "${{ github.event.pull_request.base.sha }}" --head-sha "${{ github.sha }}"

      - name: Build Core Public API Smoke Target (Release)
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/build.ps1 -Config Release -Target core_public_api_smoke

      - name: Build Core Public API Header Compile Target (Release)
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/build.ps1 -Config Release -Target core_public_api_headers_compile

      - name: Build Core Public API Stable Header Scenarios Target (Release)
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/build.ps1 -Config Release -Target core_public_api_stable_header_scenarios

      - name: Build Core Public API Extensibility Smoke Target (Release)
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/build.ps1 -Config Release -Target core_public_api_extensibility_smoke

      - name: Build Core Public API Realtime Capability Smoke Target (Release)
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/build.ps1 -Config Release -Target core_public_api_realtime_capability_smoke

      - name: Build Core Public API AWS Provider Smoke Target (Release)
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/build.ps1 -Config Release -Target core_public_api_worlds_aws_smoke

      - name: Run Core Public API Consumer Tests
        shell: pwsh
        run: |
          ctest --preset windows-test --parallel 8 -R "CorePublicApi|CoreApiBoundaryFixtures|CoreApiStableGovernanceFixtures" --output-on-failure

  core-api-consumer-linux:
    name: Core API Governance and Consumer Tests (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Info
        run: |
          docker version
          docker compose version

      - name: Build Base Image (dynaxis-base) with cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          tags: dynaxis-base:latest
          load: true
          cache-from: type=gha,scope=dynaxis-base-${{ runner.os }}
          cache-to: type=gha,mode=max,scope=dynaxis-base-${{ runner.os }}
          provenance: false

      - name: Verify Local Base Image
        run: |
          docker image inspect dynaxis-base:latest > /dev/null

      - name: Run Core API Contract Checks and Linux Consumer Tests
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/app" \
            -w /app \
            dynaxis-base:latest \
            bash -lc "set -e; apt-get update && apt-get install -y ninja-build; \
            python3 tools/check_core_api_contracts.py --check-boundary; \
            python3 tools/check_core_api_contracts.py --check-boundary-fixtures; \
            python3 tools/check_core_api_contracts.py --check-stable-governance-fixtures; \
            cmake --preset linux -DBUILD_GTEST_TESTS=OFF -DBUILD_CONTRACT_TESTS=ON; \
            cmake --build --preset linux-debug --target core_public_api_smoke core_public_api_headers_compile core_public_api_stable_header_scenarios core_public_api_extensibility_smoke core_public_api_realtime_capability_smoke core_public_api_worlds_aws_smoke --parallel; \
            ctest --test-dir build-linux --parallel 8 -R 'CorePublicApi|CoreApiBoundaryFixtures|CoreApiStableGovernanceFixtures' --output-on-failure"
