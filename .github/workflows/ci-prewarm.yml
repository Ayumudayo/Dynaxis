name: CI Prewarm

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  PYTHONIOENCODING: utf-8

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-conan-prewarm:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      CONAN_HOME: ${{ github.workspace }}-conan2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Mark Conan cache restore start (Windows)
        shell: pwsh
        run: |
          "CONAN_CACHE_RESTORE_START=$(Get-Date -AsUTC -Format o)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Restore Conan cache (Windows)
        id: conan_cache_restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CONAN_HOME }}
          key: ${{ runner.os }}-conan2-${{ hashFiles('conan.lock', 'conanfile.py', 'conan/profiles/**', 'scripts/setup_conan.ps1', 'scripts/build.ps1') }}
          restore-keys: |
            ${{ runner.os }}-conan2-

      - name: Summarize Conan cache restore (Windows)
        shell: pwsh
        run: |
          $start = [DateTime]::Parse($env:CONAN_CACHE_RESTORE_START)
          $elapsed = [Math]::Round(((Get-Date).ToUniversalTime() - $start).TotalSeconds, 2)
          $hit = '${{ steps.conan_cache_restore.outputs.cache-hit }}'
          if ([string]::IsNullOrWhiteSpace($hit)) { $hit = 'false' }
          $matchedKey = '${{ steps.conan_cache_restore.outputs.cache-matched-key }}'
          if ([string]::IsNullOrWhiteSpace($matchedKey)) { $matchedKey = 'N/A' }
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '### conan cache telemetry (Windows prewarm)'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- restore_hit: {0}" -f $hit)
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- restore_elapsed_sec: {0}" -f $elapsed)
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- restore_key: {0}" -f $matchedKey)

      - name: Ensure Conan cache directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${{ env.CONAN_HOME }}" | Out-Null

      - name: Ensure lockfile exists
        shell: pwsh
        run: |
          if (-not (Test-Path "conan.lock")) {
            throw "conan.lock is required for reproducible Conan CI runs"
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan2
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install "conan>=2.0,<3"
          conan --version

      - name: Enable MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Prime Conan dependencies (Release)
        if: steps.conan_cache_restore.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/setup_conan.ps1 -Config Release -Feature windows-dev -BuildDir build-windows

      - name: Mark Conan cache save start (Windows)
        if: success() && steps.conan_cache_restore.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          "CONAN_CACHE_SAVE_START=$(Get-Date -AsUTC -Format o)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Save Conan cache (Windows)
        if: success() && steps.conan_cache_restore.outputs.cache-hit != 'true'
        id: conan_cache_save
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CONAN_HOME }}
          key: ${{ steps.conan_cache_restore.outputs.cache-primary-key }}

      - name: Summarize Conan cache save (Windows)
        if: always()
        shell: pwsh
        run: |
          $saveOutcome = '${{ steps.conan_cache_save.outcome }}'
          if ([string]::IsNullOrWhiteSpace($saveOutcome)) { $saveOutcome = 'unknown' }
          if ('${{ steps.conan_cache_restore.outputs.cache-hit }}' -eq 'true') {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- save_skipped: true (exact cache hit)'
            return
          }
          if ([string]::IsNullOrWhiteSpace($env:CONAN_CACHE_SAVE_START)) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- save_status: {0}" -f $saveOutcome)
            return
          }
          $start = [DateTime]::Parse($env:CONAN_CACHE_SAVE_START)
          $elapsed = [Math]::Round(((Get-Date).ToUniversalTime() - $start).TotalSeconds, 2)
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- save_status: {0}" -f $saveOutcome)
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- save_elapsed_sec: {0}" -f $elapsed)

  linux-base-image-prewarm:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Info
        run: |
          docker version
          docker compose version

      - name: Build Base Image (dynaxis-base) with cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          tags: dynaxis-base:latest
          load: true
          cache-from: type=gha,scope=dynaxis-base-${{ runner.os }}
          cache-to: type=gha,mode=max,scope=dynaxis-base-${{ runner.os }}
          provenance: false

      - name: Verify Local Base Image
        run: |
          docker image inspect dynaxis-base:latest > /dev/null
