name: CI Prewarm

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  PYTHONIOENCODING: utf-8

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-conan-prewarm:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      CONAN_HOME: ${{ github.workspace }}-conan2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Prepare Prewarm Telemetry Directory
        shell: pwsh
        run: |
          $telemetryDir = Join-Path $env:GITHUB_WORKSPACE "build/ci-prewarm"
          New-Item -ItemType Directory -Force -Path $telemetryDir | Out-Null
          "PREWARM_TELEMETRY_DIR=$telemetryDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Mark Conan cache restore start (Windows)
        shell: pwsh
        run: |
          "CONAN_CACHE_RESTORE_START=$(Get-Date -AsUTC -Format o)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Restore Conan cache (Windows)
        id: conan_cache_restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CONAN_HOME }}
          key: ${{ runner.os }}-conan2-${{ hashFiles('conan.lock', 'conanfile.py', 'conan/profiles/**', 'scripts/setup_conan.ps1', 'scripts/build.ps1') }}
          restore-keys: |
            ${{ runner.os }}-conan2-

      - name: Summarize Conan cache restore (Windows)
        shell: pwsh
        run: |
          $start = [DateTime]::Parse($env:CONAN_CACHE_RESTORE_START)
          $elapsed = [Math]::Round(((Get-Date).ToUniversalTime() - $start).TotalSeconds, 2)
          $hit = '${{ steps.conan_cache_restore.outputs.cache-hit }}'
          if ([string]::IsNullOrWhiteSpace($hit)) { $hit = 'false' }
          $matchedKey = '${{ steps.conan_cache_restore.outputs.cache-matched-key }}'
          if ([string]::IsNullOrWhiteSpace($matchedKey)) { $matchedKey = 'N/A' }
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '### conan cache telemetry (Windows prewarm)'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- restore_hit: {0}" -f $hit)
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- restore_elapsed_sec: {0}" -f $elapsed)
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- restore_key: {0}" -f $matchedKey)
          $telemetryPath = Join-Path $env:PREWARM_TELEMETRY_DIR "windows-conan-prewarm.json"
          $payload = [ordered]@{
            workflow = "ci-prewarm"
            job = "windows-conan-prewarm"
            run_id = "${{ github.run_id }}"
            run_attempt = "${{ github.run_attempt }}"
            runner_os = "${{ runner.os }}"
            restore = [ordered]@{
              cache_hit = $hit
              elapsed_sec = $elapsed
              matched_key = $matchedKey
              primary_key = '${{ steps.conan_cache_restore.outputs.cache-primary-key }}'
              recorded_at_utc = (Get-Date).ToUniversalTime().ToString('o')
            }
          }
          $payload | ConvertTo-Json -Depth 6 | Set-Content -Path $telemetryPath -Encoding utf8

      - name: Ensure Conan cache directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${{ env.CONAN_HOME }}" | Out-Null

      - name: Ensure lockfile exists
        shell: pwsh
        run: |
          if (-not (Test-Path "conan.lock")) {
            throw "conan.lock is required for reproducible Conan CI runs"
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan2
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install "conan>=2.0,<3"
          conan --version

      - name: Enable MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Prime Conan dependencies (Release)
        if: steps.conan_cache_restore.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/setup_conan.ps1 -Config Release -Feature windows-dev -BuildDir build-windows

      - name: Mark Conan cache save start (Windows)
        if: success() && steps.conan_cache_restore.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          "CONAN_CACHE_SAVE_START=$(Get-Date -AsUTC -Format o)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Save Conan cache (Windows)
        if: success() && steps.conan_cache_restore.outputs.cache-hit != 'true'
        id: conan_cache_save
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CONAN_HOME }}
          key: ${{ steps.conan_cache_restore.outputs.cache-primary-key }}

      - name: Summarize Conan cache save (Windows)
        if: always()
        shell: pwsh
        run: |
          $telemetryPath = Join-Path $env:PREWARM_TELEMETRY_DIR "windows-conan-prewarm.json"
          $payload = if (Test-Path $telemetryPath) {
            Get-Content -Path $telemetryPath -Raw | ConvertFrom-Json -AsHashtable
          } else {
            [ordered]@{
              workflow = "ci-prewarm"
              job = "windows-conan-prewarm"
              run_id = "${{ github.run_id }}"
              run_attempt = "${{ github.run_attempt }}"
              runner_os = "${{ runner.os }}"
            }
          }
          $saveOutcome = '${{ steps.conan_cache_save.outcome }}'
          if ([string]::IsNullOrWhiteSpace($saveOutcome)) { $saveOutcome = 'unknown' }
          if ('${{ steps.conan_cache_restore.outputs.cache-hit }}' -eq 'true') {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- save_skipped: true (exact cache hit)'
            $payload.save = [ordered]@{
              skipped = $true
              reason = "exact cache hit"
              status = $saveOutcome
              recorded_at_utc = (Get-Date).ToUniversalTime().ToString('o')
            }
            $payload | ConvertTo-Json -Depth 6 | Set-Content -Path $telemetryPath -Encoding utf8
            return
          }
          if ([string]::IsNullOrWhiteSpace($env:CONAN_CACHE_SAVE_START)) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- save_status: {0}" -f $saveOutcome)
            $payload.save = [ordered]@{
              skipped = $false
              status = $saveOutcome
              recorded_at_utc = (Get-Date).ToUniversalTime().ToString('o')
            }
            $payload | ConvertTo-Json -Depth 6 | Set-Content -Path $telemetryPath -Encoding utf8
            return
          }
          $start = [DateTime]::Parse($env:CONAN_CACHE_SAVE_START)
          $elapsed = [Math]::Round(((Get-Date).ToUniversalTime() - $start).TotalSeconds, 2)
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- save_status: {0}" -f $saveOutcome)
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- save_elapsed_sec: {0}" -f $elapsed)
          $payload.save = [ordered]@{
            skipped = $false
            status = $saveOutcome
            elapsed_sec = $elapsed
            recorded_at_utc = (Get-Date).ToUniversalTime().ToString('o')
          }
          $payload | ConvertTo-Json -Depth 6 | Set-Content -Path $telemetryPath -Encoding utf8

      - name: Upload Prewarm Telemetry Artifact (Windows)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-prewarm-windows-conan-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            build/ci-prewarm/windows-conan-prewarm.json

  linux-base-image-prewarm:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Prepare Prewarm Telemetry Directory (Linux)
        run: |
          mkdir -p build/ci-prewarm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Info
        run: |
          docker version
          docker compose version

      - name: Mark Base Image Build Start (Linux)
        run: |
          echo "BASE_IMAGE_BUILD_START=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Build Base Image (dynaxis-base) with cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          tags: dynaxis-base:latest
          load: true
          cache-from: type=gha,scope=dynaxis-base-${{ runner.os }}
          cache-to: type=gha,mode=max,scope=dynaxis-base-${{ runner.os }}
          provenance: false

      - name: Verify Local Base Image
        run: |
          docker image inspect dynaxis-base:latest > /dev/null

      - name: Summarize Base Image Prewarm (Linux)
        if: always()
        run: |
          python3 - <<'PY'
          import json, os, pathlib
          from datetime import datetime, timezone

          start_raw = os.environ.get("BASE_IMAGE_BUILD_START", "").strip()
          elapsed = None
          if start_raw:
              start = datetime.strptime(start_raw, "%Y-%m-%dT%H:%M:%SZ").replace(tzinfo=timezone.utc)
              elapsed = round((datetime.now(timezone.utc) - start).total_seconds(), 2)

          payload = {
              "workflow": "ci-prewarm",
              "job": "linux-base-image-prewarm",
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "runner_os": os.environ.get("RUNNER_OS", ""),
              "base_image_build": {
                  "elapsed_sec": elapsed,
                  "recorded_at_utc": datetime.now(timezone.utc).isoformat(),
              },
          }
          path = pathlib.Path("build/ci-prewarm/linux-base-image-prewarm.json")
          path.write_text(json.dumps(payload, indent=2), encoding="utf-8")
          with pathlib.Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a", encoding="utf-8") as handle:
              handle.write("### base image telemetry (Linux prewarm)\n")
              handle.write(f"- build_elapsed_sec: {elapsed}\n")
          PY

      - name: Upload Prewarm Telemetry Artifact (Linux)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-prewarm-linux-base-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            build/ci-prewarm/linux-base-image-prewarm.json
